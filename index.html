<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NFL Passer Rating Calculator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container" id="app">
    <header class="hero">
      <p class="eyebrow">Quarterback Analytics</p>
      <h1>NFL Passer Rating Calculator</h1>
      <p class="subtitle">Calculate official NFL passer rating instantly from basic passing stats.</p>
    </header>

    <form id="rating-form" novalidate>
      <div class="fields">
        <label class="field" for="attempts">
          <span>Attempts</span>
          <input id="attempts" name="attempts" type="number" min="1" step="1" required inputmode="numeric" placeholder="e.g. 35">
          <small>Must be at least 1</small>
        </label>

        <label class="field" for="completions">
          <span>Completions</span>
          <input id="completions" name="completions" type="number" min="0" step="1" required inputmode="numeric" placeholder="e.g. 24">
          <small>Cannot exceed attempts</small>
        </label>

        <label class="field" for="yards">
          <span>Passing Yards</span>
          <input id="yards" name="yards" type="number" min="0" step="1" required inputmode="numeric" placeholder="e.g. 280">
          <small>0 or higher</small>
        </label>

        <label class="field" for="touchdowns">
          <span>Touchdowns</span>
          <input id="touchdowns" name="touchdowns" type="number" min="0" step="1" required inputmode="numeric" placeholder="e.g. 2">
          <small>0 or higher</small>
        </label>

        <label class="field" for="interceptions">
          <span>Interceptions</span>
          <input id="interceptions" name="interceptions" type="number" min="0" step="1" required inputmode="numeric" placeholder="e.g. 1">
          <small>0 or higher</small>
        </label>
      </div>

      <div class="actions">
        <button type="button" id="example-btn" class="ghost">Use Example Stats</button>
        <button type="reset" class="ghost">Clear</button>
        <button type="submit">Calculate Rating</button>
      </div>
    </form>

    <section class="result" aria-live="polite">
      <h2>Result</h2>
      <p id="message">Enter stats and press Calculate Rating.</p>
      <p id="rating" class="rating-value">--</p>
      <p id="tier" class="tier">Tier: --</p>
      <progress id="rating-meter" max="158.3" value="0"></progress>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
